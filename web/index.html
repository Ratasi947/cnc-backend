<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CNC Database Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container py-4">
    <h2 class="text-center mb-4">CNC Database Control Panel</h2>

    <!-- INSERT -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Insert Drawing</div>
        <div class="card-body">
            <input id="ins_id" class="form-control mb-2" placeholder="ID (tự nhập)">
            <input id="ins_filename" class="form-control mb-2" placeholder="Filename">
            <textarea id="ins_content" class="form-control mb-2" placeholder="Content"></textarea>
            <button class="btn btn-primary w-100" onclick="insertData()">Insert</button>
        </div>
    </div>

    <!-- UPDATE -->
    <div class="card mb-4">
        <div class="card-header bg-warning">Update Drawing</div>
        <div class="card-body">
            <input id="upd_id" class="form-control mb-2" placeholder="ID cần update">
            <input id="upd_filename" class="form-control mb-2" placeholder="Filename mới">
            <textarea id="upd_content" class="form-control mb-2" placeholder="Content mới"></textarea>
            <button class="btn btn-warning w-100" onclick="updateData()">Update</button>
        </div>
    </div>

    <!-- GET BY ID -->
    <div class="card mb-4">
        <div class="card-header bg-info text-white">Get Drawing By ID</div>
        <div class="card-body">
            <input id="get_id" class="form-control mb-2" placeholder="Nhập ID">
            <button class="btn btn-info w-100" onclick="getById()">Get</button>
        </div>
    </div>

    <!-- GET ALL -->
    <div class="card mb-4">
        <div class="card-header bg-success text-white">Get All Drawings</div>
        <div class="card-body">
            <button class="btn btn-success w-100" onclick="getAll()">Get All</button>
        </div>
    </div>

    <!-- RESULT -->
    <div class="card">
        <div class="card-header bg-dark text-white">Kết quả</div>
        <div class="card-body">
            <pre id="result" class="bg-light p-3"></pre>
        </div>
    </div>

</div>

<script>
const API = "https://cnc-backend-lkod.onrender.com/api";

// INSERT
async function insertData() {
    const body = {
        id: document.getElementById("ins_id").value,
        filename: document.getElementById("ins_filename").value,
        content: document.getElementById("ins_content").value
    };

    const res = await fetch(`${API}/save_drawing`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });

    document.getElementById("result").textContent = JSON.stringify(await res.json(), null, 2);
}

// UPDATE
async function updateData() {
    const id = document.getElementById("upd_id").value;

    const body = {
        id: id,
        filename: document.getElementById("upd_filename").value,
        content: document.getElementById("upd_content").value
    };

    const res = await fetch(`${API}/drawings/${id}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });

    document.getElementById("result").textContent = JSON.stringify(await res.json(), null, 2);
}

// GET BY ID
async function getById() {
    const id = document.getElementById("get_id").value;

    const res = await fetch(`${API}/drawings/${id}`);
    document.getElementById("result").textContent = JSON.stringify(await res.json(), null, 2);
}

// GET ALL
async function getAll() {
    const res = await fetch(`${API}/drawings`);
    document.getElementById("result").textContent = JSON.stringify(await res.json(), null, 2);
}
</script>

</body>
</html>
