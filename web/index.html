<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bàn Điều Khiển CNC - Bootstrap</title>

    <!-- Bootstrap 5 CDN -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <style>
        body {
            background: #f5f5f5;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #263238;
            color: white;
            padding-top: 20px;
            position: fixed;
        }
        .sidebar a {
            color: white;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover {
            background: #455a64;
        }
        .content {
            margin-left: 260px;
            padding: 25px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center mb-4">CNC Control</h4>
    <a href="#">Trang chủ</a>
    <a href="#">Quản lý bản vẽ</a>
    <a href="#">Quản lý công việc</a>
    <a href="#">Cài đặt</a>
</div>

<!-- Content -->
<div class="content">
    <h2 class="mb-4">Form nhập dữ liệu (Bootstrap)</h2>

    <div class="card shadow-sm" style="max-width: 500px;">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Tên bản vẽ</label>
                <input type="text" id="drawingName" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <input type="text" id="drawingDesc" class="form-control">
            </div>

            <button class="btn btn-primary w-100" onclick="saveData()">Lưu</button>
        </div>
    </div>

    <h2 class="mt-5">Dữ liệu mẫu</h2>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên bản vẽ</th>
                <th>Mô tả</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td>1</td>
                <td>Sample.dxf</td>
                <td>Bản vẽ mẫu</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Bootstrap JS -->
<script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>

<script>
function saveData() {
    let name = document.getElementById("drawingName").value;
    let desc = document.getElementById("drawingDesc").value;

    if (!name) {
        alert("Vui lòng nhập tên bản vẽ");
        return;
    }

    let table = document.getElementById("tableBody");
    let row = `<tr><td>NEW</td><td>${name}</td><td>${desc}</td></tr>`;
    table.innerHTML += row;

    alert("Đã thêm dữ liệu (tạm thời)");
}
</script>

</body>
</html>
